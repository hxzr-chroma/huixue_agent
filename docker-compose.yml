version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: huixue-backend
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./study_assistant.db}
      - API_PORT=8000
    volumes:
      - ./study_assistant.db:/app/study_assistant.db
    restart: unless-stopped
    networks:
      - huixue-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: huixue-frontend
    ports:
      - "8501:8501"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - API_BASE_URL=${API_BASE_URL:-http://backend:8000}
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      - backend
    stdin_open: true
    restart: unless-stopped
    networks:
      - huixue-network

networks:
  huixue-network:
    driver: bridge
